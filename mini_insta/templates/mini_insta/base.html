{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Mini Insta{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'mini_insta/style.css' %}">
</head>

<body>
  <header class="site-header">
    <div class="container">
      <h1 class="site-title">Mini Insta</h1>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; {% now "Y" %} Mini Insta</p>

      <p>
        <a href="{% url 'mini_insta:show_all_profiles' %}">Back to all profiles</a>
        {% if profile %}
          &nbsp;|&nbsp;
          <a href="{% url 'mini_insta:create_post' profile.pk %}">Create Post</a>
        {% endif %}
      </p>
    </div>
  </footer>
</body>
</html>
