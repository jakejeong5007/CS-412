{% extends 'mini_insta/base.html' %}

{% block content %}

<h1>Login to Mini Insta</h1>
<form actiopn="{% url 'mini_insta:login' %}" method="POST">
    {% csrf_token %}
    {{form}}
    <input type="submit" value="Login">
    {% if request.GET.next %}
        <input type="hidden" name="next" value="{{request.GET.next}}">
    {% else %}
        <input type="hidden" name="next" value="{% url 'mini_insta:show_all_profiles' %}">
    {% endif %}

</form>

{% endblock %}
