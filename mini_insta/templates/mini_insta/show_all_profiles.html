{% extends "mini_insta/base.html" %}

{% block title %}All Profiles{% endblock %}

{% block content %}
  <h2>All Profiles</h2>

  <div class="profile-grid">
    {% for p in profiles %}
      <div class="profile-card">
        <a href="{% url 'mini_insta:show_profile' p.pk %}">
          <img class="profile-img"
              src="{{ p.profile_image_url }}"
              alt="{{ p.display_name }}'s profile image">
        </a>

        <div class="profile-meta">
          <div class="display-name">
            <a href="{% url 'mini_insta:show_profile' p.pk %}">{{ p.display_name }}</a>
          </div>
          <div class="username">@{{ p.username }}</div>
        </div>
      </div>
    {% endfor %}

  </div>
{% endblock %}
